<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hagitori</title>
    <style>
      /* Splash screen – shown instantly while JS loads, removed by React */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: hsl(228 18% 5%);
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid hsl(230 12% 16%);
        border-top-color: hsl(168 70% 48%);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="splash"><div class="spinner"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
